name: CI – Titik Baik

on:
  push:
    branches: ["**"]
  pull_request:
    branches:
      - staging
      - main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependensi
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit Test (Jest)
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci_only
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/titik_baik
          PORT: 3000
