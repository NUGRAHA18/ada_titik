name: titik-baik-staging

services:

  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: titik_baik_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       titik_baik_staging
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_staging_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U postgres -d titik_baik_staging"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s
    networks:
      - staging_backend

  # ── Node.js API ─────────────────────────────────────────────────────────────
  app:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: titik_baik_staging_app
    restart: unless-stopped
    env_file: .env.staging
    environment:
      NODE_ENV:     staging
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/titik_baik_staging
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_staging_data:/app/uploads
    networks:
      - staging_backend

  # ── Nginx (HTTP only — SSL di Cloudflare Flexible) ─────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: titik_baik_staging_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_staging_data:/app/uploads:ro
    depends_on:
      - app
    networks:
      - staging_backend

volumes:
  pg_staging_data:       { driver: local }
  uploads_staging_data:  { driver: local }

networks:
  staging_backend:
    driver: bridge
