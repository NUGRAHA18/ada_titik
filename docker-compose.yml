name: titik-baik

services:

  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: titik_baik_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       titik_baik
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U postgres -d titik_baik"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s
    networks:
      - backend

  # ── Node.js API ─────────────────────────────────────────────────────────────
  app:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: titik_baik_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/titik_baik
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend

  # ── Nginx reverse proxy + SSL ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: titik_baik_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - app
    networks:
      - backend

volumes:
  pg_data:       { driver: local }
  uploads_data:  { driver: local }

networks:
  backend:
    driver: bridge
